<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>每日记录日历</title>
    <script>
      try {
        if (localStorage.getItem("daily-calendar-theme") === "light") {
          document.documentElement.dataset.theme = "light";
        }
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='4' width='26' height='24' rx='3' fill='%234dd4ac'/%3E%3Crect x='3' y='4' width='26' height='8' rx='3' fill='%231fa67e'/%3E%3Crect x='7' y='2' width='3' height='5' rx='1.5' fill='%2394a3b8'/%3E%3Crect x='22' y='2' width='3' height='5' rx='1.5' fill='%2394a3b8'/%3E%3Ctext x='16' y='23' text-anchor='middle' fill='%2306231d' font-size='14' font-weight='bold' font-family='system-ui'%3E%E2%9C%93%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="每日记录日历">
        <header class="app-header">
          <div class="brand">
            <div>
              <p class="eyebrow">Daily Log</p>
              <h1>每日记录日历</h1>
            </div>
          </div>

          <div class="header-actions">
            <button
              class="icon-button theme-toggle"
              id="themeToggle"
              type="button"
              aria-label="切换昼夜模式"
              aria-pressed="false"
              title="切换昼夜模式"
            >
              <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
              <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
            </button>
            <button class="cloud-status-button" id="cloudAccountButton" type="button" aria-haspopup="dialog" aria-controls="cloudAuthModal">
              <span class="cloud-status-dot" aria-hidden="true"></span>
              <span class="cloud-status-copy">
                <span class="cloud-status-label">云端同步</span>
                <span id="cloudAccountStatus">未登录</span>
              </span>
            </button>
            <div class="month-controls" aria-label="月份切换">
              <button class="icon-button" id="prevMonth" type="button" aria-label="上个月" title="上个月">
                <span aria-hidden="true">‹</span>
              </button>
              <div class="month-title" id="monthTitle"></div>
              <button class="icon-button" id="nextMonth" type="button" aria-label="下个月" title="下个月">
                <span aria-hidden="true">›</span>
              </button>
              <button class="today-button" id="todayButton" type="button">今天</button>
            </div>
          </div>
        </header>

        <div class="summary-grid" aria-label="记录概览">
          <article>
            <span id="monthEntryTotal">0</span>
            <p>本月记录</p>
          </article>
          <article>
            <span id="activeDayTotal">0</span>
            <p>记录天数</p>
          </article>
          <article>
            <span id="importantTotal">0</span>
            <p>重要记录</p>
          </article>
          <article>
            <span id="topCategory">暂无</span>
            <p>最多分类</p>
          </article>
        </div>

        <div class="filter-panel">
          <label class="field search-field" for="searchInput">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="关键词、分类、心情..." />
          </label>
          <div class="filter-actions">
            <button class="tool-button" id="filterAllButton" type="button">全部</button>
            <button class="tool-button reset-button" id="resetFilters" type="button">重置</button>
          </div>
        </div>

        <div class="category-chips" id="categoryChips" aria-label="分类统计"></div>

        <div class="calendar-card">
          <div class="weekdays" aria-hidden="true">
            <span>周一</span>
            <span>周二</span>
            <span>周三</span>
            <span>周四</span>
            <span>周五</span>
            <span>周六</span>
            <span>周日</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
      </section>

      <aside class="entry-panel" aria-label="每日记录编辑">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Selected Day</p>
            <h2 id="selectedDateTitle"></h2>
          </div>
          <span class="entry-count" id="entryCount"></span>
        </div>

        <div class="day-insight" id="dayInsight"></div>

        <form id="entryForm" class="entry-form">
          <div class="form-row">
            <label class="field" for="entryCategory">
              <span>分类</span>
              <select id="entryCategory"></select>
            </label>
            <label class="field" for="entryMood">
              <span>心情</span>
              <select id="entryMood">
                <option value="平静">平静</option>
                <option value="开心">开心</option>
                <option value="专注">专注</option>
                <option value="疲惫">疲惫</option>
                <option value="有压力">有压力</option>
              </select>
            </label>
          </div>

          <button id="manageCategoriesBtn" class="ghost-button" type="button" style="width:100%">📁 管理分类</button>

          <div id="editTimeOverlay">
            <label class="field" for="editTime">
              <span>修改记录时间</span>
              <input id="editTime" type="time" />
            </label>
          </div>

          <label class="field" for="entryText">
            <span>今天做了什么</span>
            <textarea
              id="entryText"
              rows="5"
              placeholder="例如：完成项目整理、读了 30 页书、跑步 3 公里..."
              required
            ></textarea>
          </label>

          <label class="important-check">
            <input id="entryImportant" type="checkbox" />
            <span class="toggle-track"></span>
            <span>标为重要</span>
          </label>

          <div class="form-actions">
            <button class="submit-button" id="submitEntry" type="submit">添加记录</button>
            <button class="ghost-button cancel-edit" id="cancelEdit" type="button" hidden>取消编辑</button>
          </div>
        </form>

        <div class="entries" id="entries"></div>
      </aside>
    </main>
    <!-- Category manager modal -->
    <div class="modal-overlay" id="categoryModal" hidden>
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>分类管理</h2>
          <button class="modal-close" id="modalClose" type="button" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-add-row">
            <input id="modalCategoryInput" type="text" maxlength="12" placeholder="输入新分类名称..." />
            <button id="modalAddCategory" class="tool-button" type="button">添加</button>
          </div>
          <div class="modal-category-list" id="modalCategoryList"></div>
        </div>
      </div>
    </div>

    <!-- Month entries modal -->
    <div class="modal-overlay" id="monthEntriesModal" hidden>
      <div class="modal-dialog modal-lg">
        <div class="modal-header">
          <h2 id="monthEntriesTitle">本月记录</h2>
          <button class="modal-close" id="monthEntriesClose" type="button" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body" id="monthEntriesBody">
          <p class="empty-state">加载中...</p>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="cloudAuthModal" hidden>
      <div class="modal-dialog cloud-auth-dialog" role="dialog" aria-modal="true" aria-labelledby="cloudAuthTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Cloud Sync</p>
            <h2 id="cloudAuthTitle">云端同步</h2>
          </div>
          <button class="modal-close" id="cloudAuthClose" type="button" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body cloud-auth-body">
          <div id="cloudSignedOutPanel">
            <p class="cloud-auth-copy" id="cloudAuthDescription">登录后，日历会保留在本机，并自动同步到你的私有云端空间。</p>
            <div class="cloud-auth-tabs" role="tablist" aria-label="账户操作">
              <button class="cloud-auth-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="cloudSignInForm" data-cloud-auth-mode="signin">登录</button>
              <button class="cloud-auth-tab" type="button" role="tab" aria-selected="false" aria-controls="cloudSignUpForm" data-cloud-auth-mode="signup">创建账户</button>
            </div>
            <form id="cloudSignInForm" class="cloud-auth-form" role="tabpanel">
              <label class="field" for="cloudSignInEmail">
                <span>邮箱</span>
                <input id="cloudSignInEmail" type="email" autocomplete="email" required />
              </label>
              <label class="field" for="cloudSignInPassword">
                <span>密码</span>
                <input id="cloudSignInPassword" type="password" autocomplete="current-password" minlength="6" required />
              </label>
              <button class="submit-button cloud-auth-submit" id="cloudSignIn" type="submit">登录并同步</button>
            </form>
            <form id="cloudSignUpForm" class="cloud-auth-form" role="tabpanel" hidden>
              <label class="field" for="cloudSignUpEmail">
                <span>邮箱</span>
                <input id="cloudSignUpEmail" type="email" autocomplete="email" required />
              </label>
              <label class="field" for="cloudSignUpPassword">
                <span>设置密码</span>
                <input id="cloudSignUpPassword" type="password" autocomplete="new-password" minlength="6" required />
              </label>
              <label class="field" for="cloudSignUpPasswordConfirm">
                <span>确认密码</span>
                <input id="cloudSignUpPasswordConfirm" type="password" autocomplete="new-password" minlength="6" required />
              </label>
              <button class="submit-button cloud-auth-submit" id="cloudSignUp" type="submit">创建账户</button>
            </form>
          </div>
          <section class="cloud-signed-in" id="cloudSignedInPanel" hidden aria-live="polite">
            <div class="cloud-account-profile">
              <span class="cloud-account-avatar" id="cloudAccountAvatar" aria-hidden="true">云</span>
              <div>
                <p>已登录账户</p>
                <strong id="cloudAccountEmail">--</strong>
              </div>
            </div>
            <div class="cloud-sync-state" id="cloudSyncState" data-tone="idle">
              <span class="cloud-sync-state-dot" aria-hidden="true"></span>
              <div>
                <p>同步状态</p>
                <strong id="cloudModalSyncStatus">未登录</strong>
              </div>
            </div>
            <p class="cloud-signed-in-copy">日历数据会自动保存在本机，并同步到你的私有云端空间。</p>
          </section>
          <button class="ghost-button cloud-sign-out" id="cloudSignOut" type="button" hidden>退出登录</button>
        </div>
      </div>
    </div>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <template id="entryTemplate">
      <article class="entry-item">
        <div class="entry-meta">
          <span class="entry-category"></span>
          <span class="entry-mood"></span>
          <span class="entry-important">重要</span>
        </div>
        <div class="entry-time"></div>
        <p class="entry-text"></p>
        <div class="entry-actions">
          <button class="entry-action edit-entry" type="button">编辑</button>
          <button class="entry-action toggle-important" type="button"></button>
          <button class="entry-action delete-entry" type="button" aria-label="删除记录" title="删除">×</button>
        </div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
